name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_DEFAULT_VERSION: "3.12"

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dspy]" intersystems-irispython>=5.1.2

      - name: Install test dependencies
        run: pip install pytest pytest-mock pytest-timeout pytest-asyncio coverage pytest-cov python-dotenv sqlalchemy

      - name: Run unit tests
        env:
          SKIP_IRIS_CONTAINER: "1"
        run: |
          python -m pytest tests/unit/ \
            --timeout=30 \
            --tb=short \
            -q

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting and linting
        run: |
          ruff check iris_vector_rag/ --select=E9,F63,F7,F82 --output-format=github
