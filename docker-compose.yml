# Start IRIS: docker compose up -d
# Stops: docker compose down
# Logs:  docker compose logs -f iris

services:
  iris:
    image: intersystemsdc/iris-community:latest
    container_name: iris-vector-rag
    ports:
      - "1972:1972"
      - "52773:52773"
    environment:
      - ISC_DATA_DIRECTORY=/usr/irissys/mgr
    volumes:
      - iris_data:/usr/irissys/mgr
    healthcheck:
      test: ["CMD", "/usr/irissys/bin/iris", "session", "iris", "-U%SYS", "##class(%SYSTEM.Process).CurrentDirectory()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: --check-caps false

volumes:
  iris_data:
