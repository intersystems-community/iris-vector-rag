[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

norecursedirs = .git .venv venv node_modules __pycache__ .pytest_cache htmlcov future_features future_tests_not_ready scripts build api_tests specs

addopts =
    --strict-markers
    --tb=short
    --color=yes
    -p no:randomly
    -p no:cacheprovider

markers =
    unit: Unit tests (no external services needed)
    integration: Integration tests (requires IRIS container)
    e2e: End-to-end tests (requires IRIS + API keys)
    slow: Tests that take >30s
    requires_docker: Tests that require Docker
    requires_database: Tests that require IRIS connection
    requires_redis: Tests that require Redis
    requires_llm: Tests that require LLM API access
    requires_llm_api: Alias for requires_llm
    contract: Contract tests (define expected behavior)
    benchmark: Performance benchmarks
    colbert: ColBERT/PLAID tests (requires iris-vector-graph)

asyncio_mode = auto

filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*unclosed.*:ResourceWarning

timeout = 60
timeout_method = thread
